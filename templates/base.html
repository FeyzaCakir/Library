<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kitaplık{% endblock %}</title>
    
    <!-- Ortak CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Sayfa özel CSS yüklemek için block -->
    {% block head %}{% endblock %}
</head>

<body>
    <header>
        <h1>📚 Kitaplık Uygulaması</h1>
        <nav>
            <a href="{{ url_for('index') }}">HOME</a> |
            <a href="{{ url_for('add_book') }}">ADD NEW BOOK</a>
        </nav>
        <hr>
    </header>

    <!-- Sayfaya özel içerik buraya gelecek -->
    {% block content %}{% endblock %}
</body>

</html>
