{% extends "base.html" %}
{%block title%}LOGIN{% endblock %}
{% block content %}
<h2>LOGIN</h2>
<form method="POST">
    {{form.hidden_tag()}}
    <p>{{form.email.label}}<br>{{form.email(size=40)}}</p>
    <p>{{form.password.label}}<br>{{form.password(size=40)}}</p>
    <p>{{form.submit()}}</p>
</form>
<a href="{{url_for('register')}}">DON'T YOU HAVE AN ACCOUNT? REGISTER!</a>
{% endblock  %}
